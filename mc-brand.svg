<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 30" width="100" height="30" role="img" aria-label="mc定制 版权标识">
  <title>mc定制 · 设计开发</title>
  <defs>
    <linearGradient id="mc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="mc-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Pill background -->
  <rect width="100" height="30" rx="15" fill="url(#mc-bg)"/>

  <!-- Subtle top highlight (gives depth) -->
  <rect width="100" height="15" rx="15" fill="url(#mc-shine)"/>

  <!-- Hairline inner stroke -->
  <rect x="0.5" y="0.5" width="99" height="29" rx="14.5" fill="none"
        stroke="white" stroke-opacity="0.28" stroke-width="0.6"/>

  <!-- "mc" monogram (bold, tight) -->
  <text x="13" y="20.5"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="15.5" font-weight="800" fill="white"
        letter-spacing="-0.6" font-style="italic">mc</text>

  <!-- Divider dot -->
  <circle cx="33" cy="15" r="1.4" fill="white" opacity="0.5"/>

  <!-- "定制" -->
  <text x="39" y="19"
        font-family="'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif"
        font-size="11" font-weight="500" fill="white" fill-opacity="0.96"
        letter-spacing="0.5">定制</text>
</svg>
