<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="50%" stop-color="#131325"/>
      <stop offset="100%" stop-color="#1a0f2e"/>
    </linearGradient>
    <!-- mc logo 渐变 -->
    <linearGradient id="mc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- 背景光晕 -->
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <!-- 照片色卡（模拟相册里不同色调的照片） -->
    <linearGradient id="photo1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="photo2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="photo3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="photo4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="600" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="100" rx="200" ry="120" fill="url(#blob1)"/>
  <ellipse cx="450" cy="220" rx="180" ry="100" fill="url(#blob2)"/>

  <!-- 右侧照片墙（4 张错落排列） -->
  <g transform="translate(420, 150)">
    <!-- 照片 1：橙黄（大，左上） -->
    <g transform="translate(-50, -45) rotate(-6 25 30)">
      <rect x="0" y="0" width="70" height="60" rx="6" fill="url(#photo1)" opacity="0.92"/>
      <rect x="0" y="0" width="70" height="60" rx="6" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    </g>
    <!-- 照片 2：青蓝（中，右上） -->
    <g transform="translate(28, -55) rotate(4 30 28)">
      <rect x="0" y="0" width="62" height="56" rx="6" fill="url(#photo2)" opacity="0.92"/>
      <rect x="0" y="0" width="62" height="56" rx="6" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    </g>
    <!-- 照片 3：紫粉（中，左下） -->
    <g transform="translate(-40, 28) rotate(3 28 25)">
      <rect x="0" y="0" width="60" height="52" rx="6" fill="url(#photo3)" opacity="0.92"/>
      <rect x="0" y="0" width="60" height="52" rx="6" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    </g>
    <!-- 照片 4：青绿（小，右下） -->
    <g transform="translate(32, 28) rotate(-5 25 22)">
      <rect x="0" y="0" width="54" height="48" rx="6" fill="url(#photo4)" opacity="0.92"/>
      <rect x="0" y="0" width="54" height="48" rx="6" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    </g>
  </g>

  <!-- 左侧文字信息区 -->
  <g transform="translate(40, 0)">
    <!-- mc 定制 logo（顶部） -->
    <g transform="translate(0, 50)">
      <rect x="0" y="0" width="80" height="24" rx="12" fill="url(#mc)"/>
      <rect x="0" y="0" width="80" height="12" rx="12" fill="url(#shine)"/>
      <!-- mc·定制 居中：内宽 48，左边距 16 -->
      <g transform="translate(16, 0)">
        <text x="0" y="17" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, system-ui, sans-serif" font-size="12" font-weight="800" fill="white" letter-spacing="-0.5" font-style="italic">mc</text>
        <circle cx="16" cy="12" r="1" fill="white" opacity="0.5"/>
        <text x="20" y="15" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="9" font-weight="500" fill="white" fill-opacity="0.96" letter-spacing="0.4">定制</text>
      </g>
    </g>

    <!-- 主标题 -->
    <text x="0" y="155" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="0.8">平板电子相册</text>

    <!-- 副标题（两行紧凑） -->
    <text x="0" y="185" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="11" font-weight="400" fill="rgba(255,255,255,0.65)" letter-spacing="0.4">把闲置设备改造成电子相框</text>

    <!-- 底 url -->
    <text x="0" y="265" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" font-weight="400" fill="rgba(255,255,255,0.4)" letter-spacing="0.3">crashmmm.github.io/album</text>
  </g>
</svg>
