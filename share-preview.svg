<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0b14"/>
      <stop offset="50%" stop-color="#15152a"/>
      <stop offset="100%" stop-color="#1a0f2e"/>
    </linearGradient>
    <linearGradient id="mc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="blob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 极淡光斑（不抢眼） -->
  <ellipse cx="600" cy="315" rx="240" ry="160" fill="url(#blob)"/>

  <!-- 中心内容组：宽 320px（占画布 27%），居中略偏上 -->
  <g transform="translate(600, 280)">
    <!-- mc 定制 logo（120x36） -->
    <g transform="translate(-60, -90)">
      <rect x="0" y="0" width="120" height="36" rx="18" fill="url(#mc)"/>
      <rect x="0" y="0" width="120" height="18" rx="18" fill="url(#shine)"/>
      <!-- mc·定制 居中：内宽 64，左边距 28 -->
      <g transform="translate(28, 0)">
        <text x="0" y="25" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, system-ui, sans-serif" font-size="18" font-weight="800" fill="white" letter-spacing="-0.7" font-style="italic">mc</text>
        <circle cx="24" cy="18" r="1.5" fill="white" opacity="0.5"/>
        <text x="30" y="23" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="13" font-weight="500" fill="white" fill-opacity="0.96" letter-spacing="0.6">定制</text>
      </g>
    </g>

    <!-- 主标题 -->
    <text x="0" y="-15" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="1.2">平板电子相册</text>

    <!-- 副标题（小一号） -->
    <text x="0" y="30" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="15" font-weight="400" fill="rgba(255,255,255,0.65)" letter-spacing="0.8">把闲置设备改造成电子相框</text>
  </g>

  <!-- 底部 url（极小、极淡） -->
  <text x="600" y="585" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" font-weight="400" fill="rgba(255,255,255,0.35)" letter-spacing="0.5">crashmmm.github.io/album</text>
</svg>
