<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="50%" stop-color="#131325"/>
      <stop offset="100%" stop-color="#1a0f2e"/>
    </linearGradient>
    <linearGradient id="mc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="photo1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="photo2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="photo3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="photo4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <rect width="600" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="100" rx="200" ry="120" fill="url(#blob1)"/>
  <ellipse cx="450" cy="220" rx="180" ry="100" fill="url(#blob2)"/>

  <!-- 右侧照片墙：移除 rotate（libRSVG 不支持组合 transform）+ 移除 stroke 装饰 -->
  <g transform="translate(420, 150)">
    <rect x="-50" y="-45" width="70" height="60" rx="6" fill="url(#photo1)" opacity="0.92"/>
    <rect x="28" y="-55" width="62" height="56" rx="6" fill="url(#photo2)" opacity="0.92"/>
    <rect x="-40" y="28" width="60" height="52" rx="6" fill="url(#photo3)" opacity="0.92"/>
    <rect x="32" y="28" width="54" height="48" rx="6" fill="url(#photo4)" opacity="0.92"/>
  </g>

  <!-- 左侧文字信息区 -->
  <g transform="translate(40, 0)">
    <g transform="translate(0, 50)">
      <rect x="0" y="0" width="80" height="24" rx="12" fill="url(#mc)"/>
      <rect x="0" y="0" width="80" height="12" rx="12" fill="url(#shine)"/>
      <g transform="translate(16, 0)">
        <text x="0" y="17" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, system-ui, sans-serif" font-size="12" font-weight="800" fill="#ffffff" letter-spacing="-0.5" font-style="italic">mc</text>
        <circle cx="16" cy="12" r="1" fill="#ffffff" opacity="0.5"/>
        <text x="20" y="15" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="9" font-weight="500" fill="#ffffff" opacity="0.96" letter-spacing="0.4">定制</text>
      </g>
    </g>

    <text x="0" y="155" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="0.8">平板电子相册</text>

    <text x="0" y="185" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="11" font-weight="400" fill="#ffffff" opacity="0.65" letter-spacing="0.4">把闲置设备改造成电子相框</text>

    <text x="0" y="265" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" font-weight="400" fill="#ffffff" opacity="0.4" letter-spacing="0.3">crashmmm.github.io/album</text>
  </g>
</svg>
